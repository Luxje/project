<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }
        .invoice-box {
            max-width: 600px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
        }
        .title {
            text-align: center;
            color: #ff6b81;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="invoice-box shadow">

        <h3 class="title mb-4">HÓA ĐƠN MUA HÀNG</h3>

        <p><strong>Mã hóa đơn:</strong> <span th:text="${invoice.id}"></span></p>

        <hr>

        <h5>Thông tin sản phẩm</h5>
        <p><strong>Tên:</strong> <span th:text="${invoice.name}"></span></p>
        <p><strong>Tổng tiền:</strong>
            <span th:text="${#numbers.formatInteger(invoice.price,0,'COMMA')} + ' đ'"></span>
        </p>

        <hr>

        <h5>Thông tin khác</h5>
        <p><strong>Voucher ID:</strong> <span th:text="${invoice.voucher}"></span></p>
        <p><strong>Staff ID:</strong> <span th:text="${invoice.staffid}"></span></p>
        <p><strong>Customer ID:</strong> <span th:text="${invoice.customerid}"></span></p>
        <p><strong>Ngày:</strong> <span th:text="${invoice.date}"></span></p>

        <hr>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-success">Quay về trang chủ</a>
        </div>

    </div>
</div>
</body>
</html>
