<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Teddy Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #fff4f6;
        }

        header {
            background: #ff7b9c;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        /* FORM */
        .form-box {
            width: 30%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-box h3 {
            color: #ff7b9c;
            margin-bottom: 15px;
        }

        .form-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .form-box button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #ff7b9c;
            color: white;
            cursor: pointer;
        }

        .form-box button:hover {
            background: #ff5f87;
        }

        /* TABLE */
        .table-box {
            width: 70%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #ffe0e9;
            padding: 10px;
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .edit {
            background: #ffc107;
        }

        .delete {
            background: #dc3545;
            color: white;
        }

        .edit:hover {
            background: #e0a800;
        }

        .delete:hover {
            background: #c82333;
        }

    </style>
</head>
<body>

<header>🧸 Admin - Quản lý Gấu Bông</header>

<div class="container">

    <!-- FORM -->
    <div class="form-box">
        <h3>Thêm / Sửa sản phẩm</h3>

        <form action="/admin/product/save" method="post">
            <input type="hidden" name="id">

            <input type="text" name="name" placeholder="Tên gấu">
            <input type="number" name="price" placeholder="Giá">
            <input type="text" name="image" placeholder="Link ảnh">

            <button type="submit">Lưu sản phẩm</button>
        </form>
    </div>

    <!-- TABLE -->
    <div class="table-box">
        <h3>Danh sách sản phẩm</h3>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Ảnh</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>1</td>
                <td>Gấu Teddy nâu</td>
                <td>200000</td>
                <td><img src="https://via.placeholder.com/50"></td>
                <td>
                    <button class="btn edit">Sửa</button>
                    <button class="btn delete">Xoá</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
